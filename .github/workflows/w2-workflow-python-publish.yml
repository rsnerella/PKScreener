# """
# This workflows will upload a Python Package using Twine when a commit is pushed
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: 2. PyPi Publish

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'PyPi Publish'
        required: false
        default: 'PyPi Publish'

      branch-name:
        description: 'branch-name'
        required: true
        type: string
        default: 'main'
        
      version:
        description: 'Release version'
        required: true
        type: string
        default: 'x.y.z'

      sendNotification:
        description: 'Should we send notification to public telegram channel about this release?'
        type: string
        required: false
        default: 'yes'

      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11,3,12,3.13 ?'
        required: false
        type: string
        default: '3.12'

  # schedule:
  #   - cron: '30 7 * * 6'
  workflow_call:
    inputs:
      branch-name:
        required: true
        type: string
        default: 'main'
      version:
        required: true
        type: string
        default: 'x.y.z'
      sendNotification:
        description: 'Should we send notification to public telegram channel about this release?'
        type: string
        required: false
        default: 'no'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11, 3.12, 3.13 ?'
        required: false
        type: string
        default: '3.12'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
        
jobs:
  # Check whether to build the wheels and the source tarball
  check_build_trigger:
    name: Check build trigger
    runs-on: ubuntu-latest
    if: github.repository == 'pkjmesra/PKScreener'
    outputs:
      build: ${{ steps.check_build_trigger.outputs.build }}

    steps:
      - name: Checkout PKScreener
        uses: actions/checkout@v3
        with:
          ref: main 
            # ${{ github.event.pull_request.head.sha }}

      - id: check_build_trigger
        name: Check build trigger
        run: bash .github/dependencies/build_tools/github/check_build_trigger.sh
  
  check_should_run:
      runs-on: windows-latest
      name: Check latest commit
      outputs:
        should_run: ${{ steps.should_run.outputs.should_run }}
      steps:
        - uses: actions/checkout@v4
          with:
            ref: main
        - name: print latest_commit
          run: echo ${{ github.sha }}

        - id: should_run
          continue-on-error: true
          name: check latest commit is less than a week
          if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
          shell: bash
          run: test -z $(git rev-list  --after="7 days"  ${{ github.sha }} --max-count=1) && echo "::set-output name=should_run::false"

  build_wheels:
    name: Build wheel for cp${{ matrix.python }}-${{ matrix.platform_id }}-${{ matrix.manylinux_image }}
    runs-on: ${{ matrix.os }}
    # defaults:
    #   run:
    #     shell: bash -l {0}
    # needs: check_build_trigger
    # if: needs.check_build_trigger.outputs.build

    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        include:
          # Window 64 bit
          # Note: windows-2019 is needed for older Python versions:
          # https://github.com/PKScreener/PKScreener/issues/22530
          - os: windows-latest
            python: 312
            platform_id: win_amd64

          # NumPy on Python 3.10 only supports 64bit and is only available with manylinux2014
          - os: ubuntu-latest
            python: 312
            platform_id: manylinux_x86_64
            manylinux_image: manylinux2014

          - os: macos-15
            python: 312
            platform_id: macosx_x86_64

          - os: macos-14
            python: 312
            platform_id: macosx_arm64

    steps:
      - name: Checkout PKScreener
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # update once build dependencies are available

      # ============================================================================
      # TA-LIB INSTALLATION FOR MACOS (using brew)
      # ============================================================================
      - name: Install TA-Lib for macOS x86_64
        if: ${{ matrix.platform_id == 'macosx_x86_64' }}
        run: |
          brew install ta-lib
          brew upgrade ta-lib
          arch -x86_64 brew install ta-lib
          echo "TA_INCLUDE_PATH=$(brew --prefix ta-lib)/include" >> $GITHUB_ENV
          echo "TA_LIBRARY_PATH=$(brew --prefix ta-lib)/lib" >> $GITHUB_ENV

      - name: Install TA-Lib for macOS arm64
        if: ${{ matrix.platform_id == 'macosx_arm64' }}
        run: |
          brew install ta-lib
          brew upgrade ta-lib
          arch -arm64 brew install ta-lib
          echo "TA_INCLUDE_PATH=$(brew --prefix ta-lib)/include" >> $GITHUB_ENV
          echo "TA_LIBRARY_PATH=$(brew --prefix ta-lib)/lib" >> $GITHUB_ENV

      # ============================================================================
      # PYTHON DEPENDENCY INSTALLATION (pip only - no conda)
      # ============================================================================
      - name: Install Python Dependencies - Windows
        if: ${{ matrix.platform_id == 'win_amd64' }}
        run: |
          pip3.12 install https://github.com/pkjmesra/libsql-python/releases/download/released/libsql-0.1.6-cp312-cp312-win_amd64.whl
          pip3 install -r requirements.txt
          pip3 install -r requirements-dev.txt

      - name: Install Python Dependencies - Linux
        if: ${{ matrix.platform_id == 'manylinux_x86_64' }}
        run: |
          cd .github/dependencies/
          sudo dpkg -i ta-lib_0.6.4_amd64.deb
          cd /home/runner/work/PKScreener/PKScreener/
          pip3 install -r requirements.txt
          pip3 install -r requirements-dev.txt
          pip3 install libsql

      - name: Install Python Dependencies - macOS (pip only)
        if: ${{ matrix.platform_id == 'macosx_x86_64' || matrix.platform_id == 'macosx_arm64' }}
        run: |
          echo "🖥️ macOS detected - installing with pip only (no conda)"
          
          # Uninstall any conflicting packages if present
          pip3 uninstall -y numba llvmlite numpy scipy coverage || true
          
          # Install pinned versions first (matching requirements.txt)
          pip3 install numpy==1.26.4
          pip3 install scipy==1.12.0
          pip3 install llvmlite==0.44.0
          pip3 install numba==0.61.2
          pip3 install coverage==7.13.0
          
          # Install TA-Lib via pip (brew already installed the library)
          if [[ "${{ matrix.platform_id }}" == "macosx_x86_64" ]]; then
            pip3 install --no-cache-dir ta-lib --no-binary=ta-lib
          else
            pip3 install --no-cache-dir ta-lib --no-binary=ta-lib
          fi
          
          # Install the rest of the requirements
          pip3 install -r requirements.txt
          pip3 install -r requirements-dev.txt
          pip3 install libsql

      # ============================================================================
      # VERSION MANAGEMENT
      # ============================================================================
      - name: Declare env variables
        id: vars
        shell: bash
        run: |
          GITHUB_REF=${GITHUB_REF#refs/tags/}
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"
          CURRENT_VERSION=`grep -o "'.*'" pkscreener/classes/__init__.py | sed "s/'//g"`
          VERSION_ARR=(${CURRENT_VERSION//./ })
          MAJOR_MINOR=${VERSION_ARR[0]}.${VERSION_ARR[1]}
          TODAY=`date +%Y%m%d`
          THIS_VERSION=${MAJOR_MINOR}.${TODAY}.${{github.run_number}}
          echo ${THIS_VERSION}
          if [ "${{ inputs.version }}" == "x.y.z" ]; then
            echo "default version x.y.z cannot be used"
          else
            THIS_VERSION="${{ inputs.version }}"
          fi
          rm -rf pkscreener/classes/__init__.py
          echo VERSION=\'`echo ${THIS_VERSION}`\' >> pkscreener/classes/__init__.py
          echo "##[set-output name=THIS_VERSION;]$(echo ${THIS_VERSION})"
          echo "##[set-output name=CURRENT_VERSION;]$(echo ${CURRENT_VERSION})"

      - name: Install setuptools
        shell: bash
        run: |
          pip3 install setuptools wheel twine

      # ============================================================================
      # BUILD WHEELS
      # ============================================================================
      - name: Build and test wheels
        env:
          CIBW_BUILD: cp${{ matrix.python }}-${{ matrix.platform_id }}
          CIBW_ARCHS: all
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
          CIBW_MANYLINUX_I686_IMAGE: ${{ matrix.manylinux_image }}
          # Needed on Windows CI to compile with Visual Studio compiler
          # otherwise Meson detects a MINGW64 platform and use MINGW64
          # toolchain
          CIBW_CONFIG_SETTINGS_WINDOWS: "setup-args=--vsenv"
          CIBW_BUILD_VERBOSITY: 1
        run: bash .github/dependencies/build_tools/wheels/build_wheels.sh

      - name: Create manylinux wheel from linux
        shell: bash
        if: ${{ matrix.platform_id == 'manylinux_x86_64' }}
        run: |
          mv dist/pkscreener-${{ steps.vars.outputs.THIS_VERSION }}-cp${{ matrix.python }}-cp${{ matrix.python }}-linux_x86_64.whl dist/pkscreener-${{ steps.vars.outputs.THIS_VERSION }}-cp${{ matrix.python }}-cp${{ matrix.python }}-manylinux2014_x86_64.whl

      # ============================================================================
      # PUBLISH TO PYPI
      # ============================================================================
      - name: Build and publish distribution 📦 to Test PyPI
        env:
          TWINE_USERNAME: ${{ secrets.TESTPYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_PASSWORD }}
          repository_url: https://test.pypi.org/legacy/
        shell: bash
        run: |
          twine upload --verbose --repository-url https://test.pypi.org/legacy/ dist/*.whl

      - name: Publish distribution 📦 to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          repository_url: https://upload.pypi.org/legacy/
        shell: bash
        run: |
          twine upload --verbose dist/*.whl

      - name: Build and publish source code 📦 to Test PyPI
        env:
          TWINE_USERNAME: ${{ secrets.TESTPYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_PASSWORD }}
          repository_url: https://test.pypi.org/legacy/
        shell: bash
        if: ${{ matrix.platform_id == 'manylinux_x86_64' && matrix.python == '312' }}
        run: |
          twine upload --verbose --repository-url https://test.pypi.org/legacy/ dist/*.tar.gz
  
      - name: Publish source code 📦 to PyPI
        if: ${{ matrix.platform_id == 'manylinux_x86_64' && matrix.python == '312' && startsWith(inputs.branch-name, 'refs/tags') }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          repository_url: https://upload.pypi.org/legacy/
        shell: bash
        run: |
          twine upload --verbose dist/*.tar.gz

      # ============================================================================
      # TELEGRAM NOTIFICATION
      # ============================================================================
      - name: Configure .env.dev file for Prod
        shell: bash
        if: ${{ inputs.sendNotification != 'no' }}
        env:
          CHAT_ID_PROD : ${{secrets.CHAT_ID_PROD}}
          CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
          TOKEN_DEV : ${{secrets.TOKEN_DEV}}
          CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOKEN: ${{ secrets.TOKEN }}
          chat_idADMIN: ${{ secrets.chat_idADMIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PAT: ${{ secrets.CI_PAT }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          TDU: ${{ secrets.TDU }}
          TAT: ${{ secrets.TAT }}
          MCU: ${{ secrets.MCU }}
          MCAP: ${{ secrets.MCAP }}
          MCL: ${{ secrets.MCL }}
          MS: ${{ secrets.MS }}
          PKG: ${{ secrets.PKG }}
          REPO_URL: ${{ secrets.REPO_URL }}
          KTOKEN: ${{ secrets.KTOKEN }}
          KUSER: ${{ secrets.KUSER }}
          KPWD: ${{ secrets.KPWD }}
          KTOTP: ${{ secrets.KTOTP }}
          DB_TYPE: "local"
          DB_TICKS: ${{ secrets.DB_TICKS }}
          TBTOKEN: ${{ secrets.TBTOKEN }}
          BBTOKEN: ${{ secrets.BBTOKEN }}
          Tel_API_ID: ${{ secrets.Tel_API_ID }}
          Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
          Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
          TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
          SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
        run: |
          # Quote all values to handle spaces properly
          cat > .env.dev << EOF
          CHAT_ID_PROD='$CHAT_ID_PROD'
          CHAT_ID_DEV='$CHAT_ID_DEV'
          TOKEN_DEV='$TOKEN_DEV'
          CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
          CHAT_ID='$CHAT_ID'
          TOKEN='$TOKEN'
          chat_idADMIN='$chat_idADMIN'
          GITHUB_TOKEN='$GITHUB_TOKEN'
          CI_PAT='$CI_PAT'
          TURSO_TOKEN='$TURSO_TOKEN'
          TDU='$TDU'
          TAT='$TAT'
          MCU='$MCU'
          MCAP='$MCAP'
          MCL='$MCL'
          MS='$MS'
          PKG='$PKG'
          REPO_URL='$REPO_URL'
          KTOKEN='$KTOKEN'
          KUSER='$KUSER'
          KPWD='$KPWD'
          KTOTP='$KTOTP'
          DB_TYPE='$DB_TYPE'
          DB_TICKS='$DB_TICKS'
          TBTOKEN='$TBTOKEN'
          BBTOKEN='$BBTOKEN'
          Tel_API_ID='$Tel_API_ID'
          Tel_API_Hash='$Tel_API_Hash'
          Tel_Phone_Number='$Tel_Phone_Number'
          TEL_SESSION_DATA='$TEL_SESSION_DATA'
          SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
          EOF
          
          echo "Created .env.dev file with secrets (values quoted)"
          cp .env.dev /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
          
      - name: Environment setup to get whats new
        shell: bash
        id: whatsnewgetter
        run: |
          pip3 install .
          python3 .github/workflows/githubutilities.py -w

      - name: Send notification about new release
        shell: bash
        if: ${{ matrix.platform_id == 'manylinux_x86_64' }}
        env:
          RELEASE_VERSION : ${{ steps.vars.outputs.THIS_VERSION }}
          WHATS_NEW: ${{ steps.whatsnewgetter.outputs.WHATS_NEW_IN_THIS_RELEASE }}
        run: |
          pip3 install .
          python3 -c "import os; from PKDevTools.classes.Telegram import send_message; send_message('Dear Channel!\nA new version of PKScreener (v' + os.environ['RELEASE_VERSION'] + ') just got released. Check it out at \n\nhttps://github.com/pkjmesra/PKScreener/releases\n or https://pypi.org/project/pkscreener/ \n\n'+os.environ['WHATS_NEW']+'\n');"

      # ============================================================================
      # UPLOAD ARTIFACTS
      # ============================================================================
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-cp${{ matrix.python }}-${{ matrix.platform_id }}-${{ matrix.manylinux_image }}
          path: dist/*.whl
          if-no-files-found: ignore

      - name: Upload Binaries to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*.whl
          tag: ${{ steps.vars.outputs.THIS_VERSION }}
          release_name: pkscreener - v${{ steps.vars.outputs.THIS_VERSION }}
          overwrite: true
          prerelease: false
          make_latest: true
          file_glob: true