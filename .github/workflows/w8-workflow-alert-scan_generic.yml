    #       echo "Binary not found, downloading..."
    #       download_binary
    #     fi
    #     # Final validation
    #     if ! file "$BINARY_PATH" | grep -q "ELF 64-bit"; then
    #       echo "ERROR: Downloaded file is not a valid Linux binary"
    #       file "$BINARY_PATH"
    #       exit 1
    #     fi

    - name: Configure env.dev file
      shell: bash
      env:
        CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
        TOKEN_DEV : ${{secrets.TOKEN_DEV}}
        CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        TOKEN: ${{ secrets.TOKEN }}
        chat_idADMIN: ${{ secrets.chat_idADMIN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        TDU: ${{ secrets.TDU }}
        TAT: ${{ secrets.TAT }}
        MCU: ${{ secrets.MCU }}
        MCAP: ${{ secrets.MCAP }}
        MCL: ${{ secrets.MCL }}
        MS: ${{ secrets.MS }}
        PKG: ${{ secrets.PKG }}
        REPO_URL: ${{ secrets.REPO_URL }}
        KTOKEN: ${{ secrets.KTOKEN }}
        KUSER: ${{ secrets.KUSER }}
        KPWD: ${{ secrets.KPWD }}
        KTOTP: ${{ secrets.KTOTP }}
        DB_TYPE: "local"
        DB_TICKS: ${{ secrets.DB_TICKS }}
        TBTOKEN: ${{ secrets.TBTOKEN }}
        BBTOKEN: ${{ secrets.BBTOKEN }}
        Tel_API_ID: ${{ secrets.Tel_API_ID }}
        Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
        Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
        TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
        SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
      run: |
        # Quote all values to handle spaces properly
        cat > .env.dev << EOF
        CHAT_ID_DEV='$CHAT_ID_DEV'
        TOKEN_DEV='$TOKEN_DEV'
        CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
        CHAT_ID='$CHAT_ID'
        TOKEN='$TOKEN'
        chat_idADMIN='$chat_idADMIN'
        GITHUB_TOKEN='$GITHUB_TOKEN'
        CI_PAT='$CI_PAT'
        TURSO_TOKEN='$TURSO_TOKEN'
        TDU='$TDU'
        TAT='$TAT'
        MCU='$MCU'
        MCAP='$MCAP'
        MCL='$MCL'
        MS='$MS'
        PKG='$PKG'
        REPO_URL='$REPO_URL'
        KTOKEN='$KTOKEN'
        KUSER='$KUSER'
        KPWD='$KPWD'
        KTOTP='$KTOTP'
        DB_TYPE='$DB_TYPE'
        DB_TICKS='$DB_TICKS'
        TBTOKEN='$TBTOKEN'
        BBTOKEN='$BBTOKEN'
        Tel_API_ID='$Tel_API_ID'
        Tel_API_Hash='$Tel_API_Hash'
        Tel_Phone_Number='$Tel_Phone_Number'
        TEL_SESSION_DATA='$TEL_SESSION_DATA'
        SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
        EOF
        
        echo "Created .env.dev file with secrets (values quoted)"

    # Phase 2: Restore pre-cached stock data for faster scans (only during non-trading hours)
    - name: Check current time in IST
      id: time-check
      shell: bash
      run: |
        # Get current time in IST
        CURRENT_HOUR=$(TZ='Asia/Kolkata' date +%H)
        CURRENT_MIN=$(TZ='Asia/Kolkata' date +%M)
        CURRENT_TIME=$((10#$CURRENT_HOUR * 60 + 10#$CURRENT_MIN))
        
        # Trading hours: 9:15 AM to 4:00 PM IST
        MARKET_OPEN=$((9 * 60 + 15))  # 9:15 AM
        MARKET_CLOSE=$((16 * 60 + 0))   # 4:00 PM
        
        echo "Current IST time: $CURRENT_HOUR:$CURRENT_MIN"
        echo "Market open: 9:15, Market close: 16:00"
        
        if [ $CURRENT_TIME -ge $MARKET_OPEN ] && [ $CURRENT_TIME -lt $MARKET_CLOSE ]; then
          echo "🕒 Market hours detected - skipping cache restore to ensure fresh data"
          echo "USE_CACHE=false" >> $GITHUB_OUTPUT
        else
          echo "🕒 Non-market hours detected - using cached data for faster scans"
          echo "USE_CACHE=true" >> $GITHUB_OUTPUT
        fi

    - name: Restore Stock Data Cache (Non-market hours only)
      if: steps.time-check.outputs.USE_CACHE == 'true'
      uses: actions/cache@v4
      with:
        path: results/Data/
        key: stock-data-${{ github.run_id }}
        restore-keys: |
          stock-data-
          
    - name: Clear cache during market hours (optional)
      if: steps.time-check.outputs.USE_CACHE == 'false'
      shell: bash
      run: |
        echo "🧹 Market hours - ensuring fresh data by removing any cached stock data"
        rm -rf results/Data/*.pkl results/Data/*.csv 2>/dev/null || true
        echo "✓ Cache cleared for fresh market data"

    - name: Create session file
      run: |
        echo ${{ secrets.TEL_SESSION_DATA }} | base64 -d > user_session.session
        chmod 600 user_session.session

    # ============================================================================
    # POST-TENSORFLOW SETUP (if needed)
    # ============================================================================
    - name: Set environment variables for TensorFlow (if installed)
      if: steps.check-tensorflow.outputs.requires_tensorflow == 'true'
      shell: bash
      run: |
        echo "🔧 Configuring TensorFlow environment..."
        
        # Disable TensorFlow warnings
        echo "TF_CPP_MIN_LOG_LEVEL=2" >> $GITHUB_ENV
        
        # Set memory growth for GPU if available
        echo "TF_FORCE_GPU_ALLOW_GROWTH=true" >> $GITHUB_ENV
        
        # Suppress oneDNN messages
        echo "TF_ENABLE_ONEDNN_OPTS=0" >> $GITHUB_ENV
        
        echo "✓ TensorFlow environment configured"

    - name: Run Scan on Windows
      shell: cmd
      timeout-minutes: 10
      if: startsWith(runner.os, 'Windows')
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
        TF_CPP_MIN_LOG_LEVEL: ${{ steps.check-tensorflow.outputs.requires_tensorflow == 'true' && '2' || '' }}
      run: |
        ${{ inputs.prerequisites }}
        pkscreenercli.exe ${{ inputs.params }}
        ${{ inputs.postrun }}

    - name: Run Scan on Ubuntu (binary, no TensorFlow)
      shell: bash
      timeout-minutes: 10
      if: startsWith(runner.os, 'Linux') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
      run: |
        ${{ inputs.prerequisites }}
        pip install libsql
        /home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin ${{ inputs.params }}
        ${{ inputs.postrun }}

    - name: Run Scan on Ubuntu from source with TensorFlow (if required)
      shell: bash
      if: steps.check-tensorflow.outputs.requires_tensorflow == 'true' && startsWith(runner.os, 'Linux')
      timeout-minutes: 15  # Increased timeout for TensorFlow runs
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
        TF_CPP_MIN_LOG_LEVEL: "2"
      run: |
        ${{ inputs.prerequisites }}
        cd /home/runner/work/PKScreener/PKScreener/
        python3 pkscreener/pkscreenercli.py ${{ inputs.params }}
        ${{ inputs.postrun }}