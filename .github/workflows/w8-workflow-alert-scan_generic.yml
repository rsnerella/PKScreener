name: 8. Generic runner for scan workflows
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Run Details'
        required: false
        default: ''
      ref:
          description: 'ref branch'
          required: false
          default: 'main'
      params:
          description: 'Run parameters'
          required: false
          default: '-a Y -e -o H:'
      user:
          description: 'Telegram user ID'
          required: false
          default: '-1001785195297'
      prerequisites:
          description: 'Run parameters for prerequisites'
          required: false
          default: 'echo Running now'
      postrun:
          description: 'Run parameters for post-run'
          required: false
          default: 'echo Finished running'
      runson:
          description: 'Runner OS. e.g: ubuntu-latest, windows-latest or macos-latest'
          required: false
          default: 'ubuntu-latest'
      installtalib:
        description: 'Is TA-Lib install required? (Y/N)'
        required: false
        default: 'N'
      alertTrigger:
        description: 'Is this triggered by scheduled scan alerts (Y/N)'
        required: false
        default: 'N'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11 ?'
        required: false
        type: string
        default: '3.12'

run-name: ${{ inputs.name }} Generic runner for scan - ${{ inputs.params }}

jobs:

  Generic_Workflow_Runner:

    runs-on: ${{ inputs.runson || 'ubuntu-latest' }} #ubuntu-latest #windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.targetPythonVersion || 3.12 }}

    # ============================================================================
    # CACHING STRATEGY 1: Global pip cache (fast)
    # ============================================================================
    - name: Cache pip packages
      uses: actions/cache@v4
      id: pip-cache
      with:
        path: |
          ~/.cache/pip
          ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt', '**/pyproject.toml', '**/setup.py') }}-${{ inputs.targetPythonVersion }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ============================================================================
    # CACHING STRATEGY 2: Virtual environment (most comprehensive)
    # ============================================================================
    - name: Cache Python virtual environment
      id: venv-cache
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt', '**/pyproject.toml', '**/setup.py') }}-${{ inputs.targetPythonVersion }}
        restore-keys: |
          ${{ runner.os }}-venv-

    # ============================================================================
    # CACHING STRATEGY 3: TA-Lib compiled libraries (Linux only)
    # ============================================================================
    - name: Load Cache for Linux Dependencies
      if: startsWith(runner.os, 'Linux')
      uses: actions/cache@v4
      with:
        path: |
          /usr/include/ta-lib
          /usr/bin/ta-lib-config
          /usr/lib/libta_lib.la
          /usr/lib/libta_lib.a
        key: ${{ runner.os }}-talib-${{ inputs.installtalib }}
        restore-keys: |
          ${{ runner.os }}-talib-

    # ============================================================================
    # INSTALLATION STEPS (using caches when available)
    # ============================================================================
    
    # Create virtual environment if cache miss
    - name: Create virtual environment (if needed)
      if: steps.venv-cache.outputs.cache-hit != 'true'
      run: |
        python -m venv .venv

    # Activate virtual environment for all subsequent Python steps
    - name: Activate virtual environment
      run: |
        echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
        echo "PATH=${{ github.workspace }}/.venv/bin:$PATH" >> $GITHUB_ENV

    # Upgrade pip (always do this, it's fast)
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install TA-Lib for Windows
      if: ${{ inputs.installtalib != 'N' && startsWith(runner.os, 'Windows') }}
      shell: bash
      run: |
        pip install requests
        cd .github/dependencies/
        if [[ "${{ inputs.targetPythonVersion }}" == "" ]] || [[ "${{ inputs.targetPythonVersion }}" == "3.12" ]]; then
          pip install ta_lib-0.6.0-cp312-cp312-win_amd64.whl
        elif [[ "${{ inputs.targetPythonVersion }}" == "3.9" ]]; then
          pip install TA_Lib-0.4.19-cp39-cp39-win_amd64.whl
        elif [[ "${{ inputs.targetPythonVersion }}" == "3.11" ]]; then
          pip install TA_Lib-0.4.29-cp311-cp311-win_amd64.whl
        fi

    - name: Install TA-Lib for Linux
      if: ${{ inputs.installtalib != 'N' && startsWith(runner.os, 'Linux') }}
      run: |
        cd .github/dependencies/
        sudo dpkg -i ta-lib_0.6.4_amd64.deb
        cd /home/runner/work/PKScreener/PKScreener/
        pip install ta-lib==0.6.0

    # Install base Python dependencies (will use pip cache if available)
    - name: Install base Python dependencies
      run: |
        # Install from requirements first (cached packages will be used)
        pip install -r requirements.txt
        # Install the package itself
        pip install -e .

    # ============================================================================
    # CHECK FOR TENSORFLOW REQUIREMENT
    # ============================================================================
    - name: Check if TensorFlow is required (X:N pattern)
      id: check-tensorflow
      shell: bash
      run: |
        PARAMS="${{ inputs.params }}"
        echo "Checking parameters: $PARAMS"
        
        # Look for -o followed by anything containing the literal "X:N"
        # This will match:
        #   -o X:N
        #   -o X:N:
        #   -o X:N::
        #   -o X:N:D:D:D:D:D
        #   -o X:N::D:D:D:D:D
        #   etc.
        if [[ "$PARAMS" =~ -o[[:space:]]*[^[:space:]]*X:N[^[:space:]]*([[:space:]]|$) ]]; then
          MATCHED="${BASH_REMATCH[0]}"
          echo "✅ X:N pattern detected in: $MATCHED"
          echo "requires_tensorflow=true" >> $GITHUB_OUTPUT
          echo "TF_VERSION=2.16.1" >> $GITHUB_OUTPUT
        else
          echo "❌ No X:N pattern detected"
          echo "requires_tensorflow=false" >> $GITHUB_OUTPUT
        fi

    - name: Install TensorFlow and Keras (when required)
      if: steps.check-tensorflow.outputs.requires_tensorflow == 'true'
      shell: bash
      run: |
        echo "📦 Installing TensorFlow ${{ steps.check-tensorflow.outputs.TF_VERSION }}..."
        
        # Install TensorFlow with specific version
        pip install tensorflow==${{ steps.check-tensorflow.outputs.TF_VERSION }}
        
        # Verify installation
        python -c "
        import tensorflow as tf
        print(f'✅ TensorFlow {tf.__version__} installed successfully')
        print(f'   GPU available: {tf.config.list_physical_devices(\"GPU\")}')"
        
        # Install Keras
        pip install keras==3.6.0
        python -c "
        import keras
        print(f'✅ Keras {keras.__version__} installed successfully')"

    # ============================================================================
    # POST-CACHE: Save virtual environment if it was just created
    # ============================================================================
    - name: Save virtual environment to cache
      if: steps.venv-cache.outputs.cache-hit != 'true'
      run: |
        echo "✅ Virtual environment created and will be cached for future runs"
        # The cache action will automatically save after this step

    - name: Environment setup to get latest EXE
      shell: bash
      id: releaseurlsetter
      run: |
        pip install requests
        python3 .github/workflows/githubutilities.py -d

    # Phase 1: Binary caching to reduce scan latency by 30-60s
    # - name: Cache PKScreener Binary (Linux)
    #   if: startsWith(runner.os, 'Linux')
    #   uses: actions/cache@v4
    #   id: binary-cache-linux
