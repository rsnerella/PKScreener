    - name: Create session file
      run: |
        echo ${{ secrets.TEL_SESSION_DATA }} | base64 -d > user_session.session
        chmod 600 user_session.session

    # ============================================================================
    # POST-TENSORFLOW SETUP (if needed)
    # ============================================================================
    - name: Set environment variables for TensorFlow (if installed)
      if: steps.check-tensorflow.outputs.requires_tensorflow == 'true'
      shell: bash
      run: |
        echo "🔧 Configuring TensorFlow environment..."
        
        # Disable TensorFlow warnings
        echo "TF_CPP_MIN_LOG_LEVEL=2" >> $GITHUB_ENV
        
        # Set memory growth for GPU if available
        echo "TF_FORCE_GPU_ALLOW_GROWTH=true" >> $GITHUB_ENV
        
        # Suppress oneDNN messages
        echo "TF_ENABLE_ONEDNN_OPTS=0" >> $GITHUB_ENV
        
        echo "✓ TensorFlow environment configured"

    # ============================================================================
    # RUN SCAN (This will download new pkl/json files if not cached)
    # ============================================================================
    - name: Run Scan on Windows
      shell: cmd
      timeout-minutes: 10
      if: startsWith(runner.os, 'Windows')
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
        TF_CPP_MIN_LOG_LEVEL: ${{ steps.check-tensorflow.outputs.requires_tensorflow == 'true' && '2' || '' }}
      run: |
        ${{ inputs.prerequisites }}
        pkscreenercli.exe ${{ inputs.params }}
        ${{ inputs.postrun }}

    - name: Run Scan on Ubuntu (binary, no TensorFlow)
      shell: bash
      timeout-minutes: 10
      if: startsWith(runner.os, 'Linux') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
        # PKDevTools_Default_Log_Level: 10
        # PKDEVTOOLS_LOG_LEVEL: 10
        # PKDEVTOOLS_DEBUG_FILES: 'PKAnalytics.py,subscriber.py'
      run: |
        ${{ inputs.prerequisites }}
        # pip install libsql
        /home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin ${{ inputs.params }}
        ${{ inputs.postrun }}
        # cat /home/runner/work/PKScreener/PKScreener/results/Data/pkscreener-logs.txt
        BINARY_NAME="${{ steps.exe-names.outputs.binary_name }}"
        COMPRESSED_NAME="${{ steps.exe-names.outputs.compressed_name }}"
        # Compress to save storage (700+ MB -> ~200 MB)
        echo "🗜️ Compressing executable..."
        gzip -c "$BINARY_NAME" > "$COMPRESSED_NAME"
        pwd
        ls -l

    - name: Run Scan on Ubuntu from source with TensorFlow (if required)
      shell: bash
      if: steps.check-tensorflow.outputs.requires_tensorflow == 'true' && startsWith(runner.os, 'Linux')
      timeout-minutes: 15  # Increased timeout for TensorFlow runs
      env:
        RUNNER : "GitHub_Actions"
        GSHEET_SERVICE_ACCOUNT_DEV: ${{secrets.GSHEET_SERVICE_ACCOUNT_DEV}}
        GSHEET_VIEWONLY_LINK: ${{secrets.GSHEET_VIEWONLY_LINK}}
        ALERT_TRIGGER: ${{ inputs.alertTrigger || 'N' }}
        TF_CPP_MIN_LOG_LEVEL: "2"
      run: |
        ${{ inputs.prerequisites }}
        cd /home/runner/work/PKScreener/PKScreener/
        python3 pkscreener/pkscreenercli.py ${{ inputs.params }}
        ${{ inputs.postrun }}

    # ============================================================================
    # HANDLE EXECUTABLE CORRUPTION - Force re-download on next run
    # # ============================================================================
    # - name: Mark cache as invalid on corruption
    #   if: steps.validate-exe.outputs.corrupted == 'true'
    #   shell: bash
    #   run: |
    #     echo "⚠️ Executable corruption detected - will force re-download on next run"
    #     # Delete the corrupted binary
    #     if [ "${{ runner.os }}" == "Linux" ]; then
    #       rm -f pkscreenercli_x64.bin pkscreenercli_x64.bin.gz
    #     else
    #       rm -f pkscreenercli.exe pkscreenercli.exe.gz
    #     fi
    #     echo "corrupted_executable=true" >> $GITHUB_ENV

    # ============================================================================
    # SAVE EXECUTABLE CACHE (AFTER SCAN - Only if we downloaded fresh)
    # ============================================================================
    - name: Save Executable Cache (after scan)
      if: (steps.download-exe-ubuntu.outcome == 'success' || steps.download-exe-windows.outcome == 'success') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      uses: actions/cache/save@v4
      with:
        path: /home/runner/work/PKScreener/PKScreener/${{ steps.exe-names.outputs.compressed_name }}
        key: exe-${{ runner.os }}-${{ steps.releaseurlsetter.outputs.VERSION }}-${{ steps.cache-id.outputs.cache_suffix }}

    - name: Log executable cache save status
      if: (steps.download-exe-ubuntu.outcome == 'success' || steps.download-exe-windows.outcome == 'success') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      shell: bash
      run: |
        ls -l
        echo "=== Executable Cache Save Status ==="
        if [ -f /home/runner/work/PKScreener/PKScreener/"${{ steps.exe-names.outputs.compressed_name }}" ]; then
          FILE_SIZE=$(stat -c%s "${{ steps.exe-names.outputs.compressed_name }}" 2>/dev/null || stat -f%z "${{ steps.exe-names.outputs.compressed_name }}" 2>/dev/null)
          echo "💾 Saved compressed executable to cache: $FILE_SIZE bytes"
        else
          echo "⚠️ No compressed executable found to save"
        fi

    # ============================================================================
    # SAVE STOCK DATA CACHE (AFTER SCAN - Non-market hours only)
    # ============================================================================
    - name: Save Stock Data Cache (after scan)
      if: steps.market-hours-check.outputs.should_save_cache == 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          results/Data/
        key: stock-data-${{ runner.os }}-${{ github.run_id }}-${{ github.run_number }}

    - name: Log cache save status
      if: steps.market-hours-check.outputs.should_save_cache == 'true'
      shell: bash
      run: |
        echo "=== Cache Save Status ==="
        if [ -d "results/Data" ]; then
          PKL_COUNT=$(find results/Data -name "*.pkl" 2>/dev/null | wc -l)
          JSON_COUNT=$(find results/Data -name "*.json" 2>/dev/null | wc -l)
          echo "💾 Saved $PKL_COUNT .pkl files and $JSON_COUNT .json files to cache"
          echo "Files in results/Data:"
          ls -la results/Data/
        else
          echo "⚠️ No data directory found to cache"
        fi