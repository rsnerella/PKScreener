name: 8. Generic runner for scan workflows
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Run Details'
        required: false
        default: ''
      ref:
          description: 'ref branch'
          required: false
          default: 'main'
      params:
          description: 'Run parameters'
          required: false
          default: '-a Y -e -o H:'
      user:
          description: 'Telegram user ID'
          required: false
          default: '-1001785195297'
      prerequisites:
          description: 'Run parameters for prerequisites'
          required: false
          default: 'echo Running now'
      postrun:
          description: 'Run parameters for post-run'
          required: false
          default: 'echo Finished running'
      runson:
          description: 'Runner OS. e.g: ubuntu-latest, windows-latest or macos-latest'
          required: false
          default: 'ubuntu-latest'
      installtalib:
        description: 'Is TA-Lib install required? (Y/N)'
        required: false
        default: 'N'
      alertTrigger:
        description: 'Is this triggered by scheduled scan alerts (Y/N)'
        required: false
        default: 'N'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11 ?'
        required: false
        type: string
        default: '3.12'

run-name: ${{ inputs.name }} Generic runner for scan - ${{ inputs.params }}

jobs:

  Generic_Workflow_Runner:

    runs-on: ${{ inputs.runson || 'ubuntu-latest' }} #ubuntu-latest #windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.targetPythonVersion || 3.12 }}

    # ============================================================================
    # CHECK FOR TENSORFLOW REQUIREMENT
    # ============================================================================
    - name: Check if TensorFlow is required (X:N pattern)
      id: check-tensorflow
      shell: bash
      run: |
        PARAMS="${{ inputs.params }}"
        echo "Checking parameters: $PARAMS"
        
        # Look for -o followed by anything containing the literal "X:N"
        # This will match:
        #   -o X:N
        #   -o X:N:
        #   -o X:N::
        #   -o X:N:D:D:D:D:D
        #   -o X:N::D:D:D:D:D
        #   etc.
        if [[ "$PARAMS" =~ -o[[:space:]]*[^[:space:]]*X:N[^[:space:]]*([[:space:]]|$) ]]; then
          MATCHED="${BASH_REMATCH[0]}"
          echo "✅ X:N pattern detected in: $MATCHED"
          echo "requires_tensorflow=true" >> $GITHUB_OUTPUT
          echo "TF_VERSION=2.16.1" >> $GITHUB_OUTPUT
        else
          echo "❌ No X:N pattern detected"
          echo "requires_tensorflow=false" >> $GITHUB_OUTPUT
        fi

    # ============================================================================
    # GET LATEST RELEASE VERSION
    # ============================================================================
    # Note: The above step depends on releaseurlsetter output.
    # We need to restructure - let's run githubutilities first
    - name: Environment setup to get latest EXE
      shell: bash
      id: releaseurlsetter
      run: |
        pip install requests
        python3 .github/workflows/githubutilities.py -d

    # ============================================================================
    # CHECK MARKET HOURS (IST: Monday-Friday 9:15 AM to 3:30 PM)
    # ============================================================================
    - name: Check if currently in market hours
      id: market-hours-check
      shell: bash
      run: |
        # Get current day of week (1=Monday, 5=Friday, 6=Saturday, 7=Sunday)
        DAY_OF_WEEK=$(TZ='Asia/Kolkata' date +%u)
        CURRENT_HOUR=$(TZ='Asia/Kolkata' date +%H)
        CURRENT_MIN=$(TZ='Asia/Kolkata' date +%M)
        CURRENT_TIME=$((10#$CURRENT_HOUR * 60 + 10#$CURRENT_MIN))
        
        # Market hours: 9:15 AM to 3:30 PM IST on weekdays
        MARKET_OPEN=$((9 * 60 + 15))   # 9:15 AM
        MARKET_CLOSE=$((15 * 60 + 30)) # 3:30 PM
        
        echo "Current IST time: $CURRENT_HOUR:$CURRENT_MIN, Day: $DAY_OF_WEEK"
        echo "Market hours: Monday-Friday, 9:15 AM to 3:30 PM IST"
        
        # Check if it's a weekday (Monday=1 through Friday=5)
        if [ $DAY_OF_WEEK -ge 1 ] && [ $DAY_OF_WEEK -le 5 ]; then
          if [ $CURRENT_TIME -ge $MARKET_OPEN ] && [ $CURRENT_TIME -lt $MARKET_CLOSE ]; then
            echo "🕒 MARKET HOURS ACTIVE - Will NOT use cached data"
            echo "is_market_hours=true" >> $GITHUB_OUTPUT
            echo "should_restore_cache=false" >> $GITHUB_OUTPUT
            echo "should_save_cache=false" >> $GITHUB_OUTPUT
          else
            echo "🕒 Non-market hours - Will restore cached data before scan"
            echo "is_market_hours=false" >> $GITHUB_OUTPUT
            echo "should_restore_cache=true" >> $GITHUB_OUTPUT
            echo "should_save_cache=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "🕒 Weekend - Will restore cached data before scan"
          echo "is_market_hours=false" >> $GITHUB_OUTPUT
          echo "should_restore_cache=true" >> $GITHUB_OUTPUT
          echo "should_save_cache=true" >> $GITHUB_OUTPUT
        fi

    # ============================================================================
    # RESTORE STOCK DATA CACHE (BEFORE SCAN - Non-market hours only)
    # ============================================================================
    - name: Restore Stock Data Cache (before scan)
      if: steps.market-hours-check.outputs.should_restore_cache == 'true'
      uses: actions/cache/restore@v4
      id: stock-data-restore
      with:
        path: |
          results/Data/
        # Use a consistent key pattern to share cache across runs
        key: stock-data-${{ runner.os }}-${{ github.run_id }}-${{ github.run_number }}
        restore-keys: |
          stock-data-${{ runner.os }}-
          stock-data-

    - name: Log cache restore status
      if: steps.market-hours-check.outputs.should_restore_cache == 'true'
      shell: bash
      run: |
        echo "=== Cache Restore Status ==="
        echo "Cache hit: ${{ steps.stock-data-restore.outputs.cache-hit }}"
        if [ -d "results/Data" ]; then
          echo "Files restored from cache:"
          ls -la results/Data/ 2>/dev/null || echo "Directory empty"
          # Count files
          PKL_COUNT=$(find results/Data -name "*.pkl" 2>/dev/null | wc -l)
          JSON_COUNT=$(find results/Data -name "*.json" 2>/dev/null | wc -l)
          echo "📊 Restored: $PKL_COUNT .pkl files, $JSON_COUNT .json files"
        else
          echo "No cached data restored - will download fresh"
        fi

    # ============================================================================
    # SET PLATFORM-SPECIFIC EXECUTABLE NAMES
    # ============================================================================
    - name: Set executable names based on platform
      id: exe-names
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Linux" ]; then
          echo "binary_name=pkscreenercli_x64.bin" >> $GITHUB_OUTPUT
          echo "compressed_name=pkscreenercli_x64.bin.gz" >> $GITHUB_OUTPUT
        elif [ "${{ runner.os }}" == "Windows" ]; then
          echo "binary_name=pkscreenercli.exe" >> $GITHUB_OUTPUT
          echo "compressed_name=pkscreenercli.exe.gz" >> $GITHUB_OUTPUT
        elif [ "${{ runner.os }}" == "macOS" ]; then
          echo "binary_name=pkscreenercli_macos" >> $GITHUB_OUTPUT
          echo "compressed_name=pkscreenercli_macos.gz" >> $GITHUB_OUTPUT
        fi

    - name: Get cache version identifier
      id: cache-id
      shell: bash
      run: |
        # Use run_id + run_attempt for uniqueness
        echo "cache_suffix=${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

    # ============================================================================
    # RESTORE EXECUTABLE CACHE (BEFORE SCAN)
    # ============================================================================
# RESTORE - Look for any cached version (use restore-keys)
    - name: Restore Executable Cache (before scan)
      id: exe-cache-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.exe-names.outputs.compressed_name }}
        # Try exact match with specific version + run_id first
        key: exe-${{ runner.os }}-${{ steps.releaseurlsetter.outputs.VERSION }}-${{ steps.cache-id.outputs.cache_suffix }}
        # Then fall back to any version of this release
        restore-keys: |
          exe-${{ runner.os }}-${{ steps.releaseurlsetter.outputs.VERSION }}-
          exe-${{ runner.os }}-

    - name: Log executable cache restore status
      shell: bash
      run: |
        echo "=== Executable Cache Restore Status ==="
        echo "Cache hit: ${{ steps.exe-cache-restore.outputs.cache-hit }}"
        if [ -f "${{ steps.exe-names.outputs.compressed_name }}" ]; then
          FILE_SIZE=$(stat -c%s "${{ steps.exe-names.outputs.compressed_name }}" 2>/dev/null || stat -f%z "${{ steps.exe-names.outputs.compressed_name }}" 2>/dev/null)
          echo "✅ Compressed executable restored from cache: $FILE_SIZE bytes"
        else
          echo "📦 No cached executable found - will download fresh"
        fi

    # ============================================================================
    # DOWNLOAD & COMPRESS EXECUTABLE (if not cached)
    # ============================================================================
    # DOWNLOAD - ONLY if cache not hit
    - name: Download and compress executable on Ubuntu
      id: download-exe-ubuntu
      if: (steps.exe-cache-restore.outputs.cache-hit != 'true') && startsWith(runner.os, 'Linux') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      shell: bash
      env:
        exe_path: ${{ steps.releaseurlsetter.outputs.DOWNLOAD_URL }}
      run: |
        BINARY_NAME="${{ steps.exe-names.outputs.binary_name }}"
        COMPRESSED_NAME="${{ steps.exe-names.outputs.compressed_name }}"
        
        echo "📦 Downloading executable from: $exe_path"
        curl -o "$BINARY_NAME" -JL "$exe_path"
        
        # Verify download was successful
        if [ ! -f "$BINARY_NAME" ]; then
          echo "ERROR: Failed to download executable"
          exit 1
        fi
        
        # Check file size (should be > 100MB)
        FILE_SIZE=$(stat -c%s "$BINARY_NAME")
        if [ $FILE_SIZE -lt 100000000 ]; then
          echo "ERROR: Downloaded file is too small ($FILE_SIZE bytes). Possible corrupted download."
          exit 1
        fi
        
        echo "✅ Downloaded executable size: $FILE_SIZE bytes"
        chmod +x "$BINARY_NAME"
        
        # # Compress to save storage (700+ MB -> ~200 MB)
        # echo "🗜️ Compressing executable..."
        # gzip -c "$BINARY_NAME" > "$COMPRESSED_NAME"
        
        # # Verify compressed file was created
        # if [ ! -f "$COMPRESSED_NAME" ]; then
        #   echo "ERROR: Failed to create compressed file"
        #   exit 1
        # fi
        
        # ORIGINAL_SIZE=$(stat -c%s "$BINARY_NAME")
        # COMPRESSED_SIZE=$(stat -c%s "$COMPRESSED_NAME")
        # RATIO=$(echo "scale=1; (1 - $COMPRESSED_SIZE/$ORIGINAL_SIZE) * 100" | bc)
        # echo "✅ Compression complete: $ORIGINAL_SIZE -> $COMPRESSED_SIZE bytes (${RATIO}% saved)"
        
        echo "✅ Executable ready at: $BINARY_NAME"

    - name: Download and compress executable on Windows
      id: download-exe-windows
      if: (steps.exe-cache-restore.outputs.cache-hit != 'true') && startsWith(runner.os, 'Windows') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      shell: bash
      env:
        exe_path: ${{ steps.releaseurlsetter.outputs.DOWNLOAD_URL }}
      run: |
        BINARY_NAME="${{ steps.exe-names.outputs.binary_name }}"
        COMPRESSED_NAME="${{ steps.exe-names.outputs.compressed_name }}"

        echo "📦 Downloading executable from: $exe_path"
        curl -o "$BINARY_NAME" -JL "$exe_path"
        
        # Verify download was successful
        if [ ! -f "$BINARY_NAME" ]; then
          echo "ERROR: Failed to download executable"
          exit 1
        fi
        
        # Check file size
        FILE_SIZE=$(stat -c%s "$BINARY_NAME")
        if [ $FILE_SIZE -lt 100000000 ]; then
          echo "ERROR: Downloaded file is too small ($FILE_SIZE bytes). Possible corrupted download."
          exit 1
        fi
        
        echo "✅ Downloaded executable size: $FILE_SIZE bytes"
        
        # # Compress to save storage
        # echo "🗜️ Compressing executable..."
        # gzip -c "$BINARY_NAME" > "$COMPRESSED_NAME"
        
        # # Verify compressed file was created
        # if [ ! -f "$COMPRESSED_NAME" ]; then
        #   echo "ERROR: Failed to create compressed file"
        #   exit 1
        # fi
        
        # ORIGINAL_SIZE=$(stat -c%s "$BINARY_NAME")
        # COMPRESSED_SIZE=$(stat -c%s "$COMPRESSED_NAME")
        # RATIO=$(echo "scale=1; (1 - $COMPRESSED_SIZE/$ORIGINAL_SIZE) * 100" | bc)
        # echo "✅ Compression complete: $ORIGINAL_SIZE -> $COMPRESSED_SIZE bytes (${RATIO}% saved)"
        
        echo "✅ Executable ready at: $BINARY_NAME"

    # ============================================================================
    # DECOMPRESS EXECUTABLE FOR USE (if cached)
    # ============================================================================
    - name: Decompress executable from cache (Ubuntu)
      if: (steps.exe-cache-restore.outputs.cache-hit == 'true') && startsWith(runner.os, 'Linux') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      shell: bash
      run: |
        BINARY_NAME="${{ steps.exe-names.outputs.binary_name }}"
        COMPRESSED_NAME="${{ steps.exe-names.outputs.compressed_name }}"
        
        echo "📦 Decompressing cached executable..."
        
        # Check if compressed file exists
        if [ ! -f "$COMPRESSED_NAME" ]; then
          echo "ERROR: Compressed file not found: $COMPRESSED_NAME"
          exit 1
        fi
        
        # Decompress
        gunzip -c "$COMPRESSED_NAME" > "$BINARY_NAME"
        chmod +x "$BINARY_NAME"
        
        # Verify decompressed file
        if [ ! -f "$BINARY_NAME" ]; then
          echo "ERROR: Failed to decompress executable"
          exit 1
        fi
        
        FILE_SIZE=$(stat -c%s "$BINARY_NAME")
        echo "✅ Decompressed executable size: $FILE_SIZE bytes"
        echo "✅ Executable ready at: $BINARY_NAME"

    - name: Decompress executable from cache (Windows)
      if: (steps.exe-cache-restore.outputs.cache-hit == 'true') && startsWith(runner.os, 'Windows') && steps.check-tensorflow.outputs.requires_tensorflow != 'true'
      shell: bash
      run: |
        BINARY_NAME="${{ steps.exe-names.outputs.binary_name }}"
        COMPRESSED_NAME="${{ steps.exe-names.outputs.compressed_name }}"
        
        echo "📦 Decompressing cached executable..."
        
        # Check if compressed file exists
        if [ ! -f "$COMPRESSED_NAME" ]; then
          echo "ERROR: Compressed file not found: $COMPRESSED_NAME"
          exit 1
        fi
        
        # Decompress
        gunzip -c "$COMPRESSED_NAME" > "$BINARY_NAME"
        
        # Verify decompressed file
        if [ ! -f "$BINARY_NAME" ]; then
          echo "ERROR: Failed to decompress executable"
          exit 1
        fi
        
        FILE_SIZE=$(stat -c%s "$BINARY_NAME")
        echo "✅ Decompressed executable size: $FILE_SIZE bytes"
        echo "✅ Executable ready at: $BINARY_NAME"

    # ============================================================================
    # VALIDATE EXECUTABLE INTEGRITY
