name: 3. PTB
on:
  workflow_dispatch:
    inputs:
      branch-name:
        description: 'Branch name'
        required: false
        default: 'main'
      installtalib:
        description: 'Is TA-Lib install required? (Y/N)'
        required: false
        default: 'N'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11 ?'
        required: false
        type: string
        default: '3.12'
      runson:
          description: 'Runner OS. e.g: ubuntu-latest, windows-latest or macos-latest or ubuntu-22.04-arm or ubuntu-24.04-arm'
          required: false
          default: 'ubuntu-latest'
      cliOptions:
        description: 'Enable Logging in the target app or pass any args to bot'
        required: false
        default: '-a Y -l'
      DOWNLOAD_URL:
        description: 'Download URL override for the bot. Provide full URL.'
        required: false
        default: ''
      targetArch:
        description: 'Target OS processor architecture? arm64 or x64 ?'
        required: false
        type: string
        default: 'x64'
      triggered_by:
        description: 'What triggered this run'
        required: false
        default: 'schedule'
        type: string
  # schedule:
  #   - cron: '30 */4 * * *'

# Add permissions for repository dispatch
permissions:
  contents: write
  actions: write

jobs:

  Prod_Telegram_Bot:
    # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
    runs-on: ${{ inputs.runson || 'ubuntu-latest' }} #ubuntu-latest #windows-latest ubuntu-24.04-arm, ubuntu-22.04-arm
    permissions: write-all
    env:
      TRIGGERED_BY: ${{ github.event.inputs.triggered_by || 'schedule' }}

    steps:
    - name: Log trigger source
      run: |
        echo "🎯 Workflow triggered by: ${{ env.TRIGGERED_BY }}"
        echo "🎯 Run ID: ${{ github.run_id }}"
        echo "🎯 Run number: ${{ github.run_number }}"
        echo "🎯 Run attempt: ${{ github.run_attempt }}"

    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch-name }}
        # repository: pkjmesra/PKScreener
        # token: ${{secrets.GITHUB_TOKEN}}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.targetPythonVersion || 3.12 }}

    - name: Cache TA-Lib
      uses: actions/cache@v4
      with:
        path: |
          ~/talib
        key: ${{ runner.os }}-talib-${{ hashFiles('**/install-talib.sh') }}

    - name: Install TA-Lib for Windows
      if: ${{ inputs.installtalib == 'Y' && startsWith(runner.os, 'Windows') }}
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        pip3 install requests
        cd .github/dependencies/
        if [[ "${{ inputs.targetPythonVersion }}" == "" ]] ;then
          pip3 install TA_Lib-0.4.28-cp312-cp312-win_amd64.whl
        elif [[ "${{ inputs.targetPythonVersion }}" == "3.9" ]] ;then
          pip3 install TA_Lib-0.4.19-cp39-cp39-win_amd64.whl
        elif [[ "${{ inputs.targetPythonVersion }}" == "3.11" ]] ;then
          pip3 install TA_Lib-0.4.28-cp311-cp311-win_amd64.whl
        elif [[ "${{ inputs.targetPythonVersion }}" == "3.12" ]] ;then
          pip3 install TA_Lib-0.4.28-cp312-cp312-win_amd64.whl
        fi

    - name: Install TA-Lib for Linux
      if: ${{ inputs.installtalib == 'Y' && startsWith(runner.os, 'Linux') }}
      run: |
        cd .github/dependencies/
        pwd
        sudo dpkg -i ta-lib_0.6.4_amd64.deb
        cd /home/runner/work/PKScreener/PKScreener/
        pip3 install ta-lib

    - name: Environment setup to get latest EXE
      shell: bash
      id: releaseurlsetter
      run: |
        pip3 install requests
        python3 .github/workflows/githubutilities.py -d

    - name: Download latest executable on Windows
      shell: cmd
      if: startsWith(runner.os, 'Windows')
      env:
        exe_path: ${{ inputs.DOWNLOAD_URL || steps.releaseurlsetter.outputs.DOWNLOAD_URL }}
      run: |
        curl -o pkscreenercli.exe -JL %exe_path%

    - name: Download latest executable on Ubuntu
      shell: bash
      if: startsWith(runner.os, 'Linux')
      env:
        exe_path: ${{ inputs.DOWNLOAD_URL || steps.releaseurlsetter.outputs.DOWNLOAD_URL }}
      run: |
        curl -o /home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin -JL $exe_path
        chmod +x /home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin

    - name: Validate and ensure binary is executable
      shell: bash
      if: startsWith(runner.os, 'Linux')
      env:
        exe_path: ${{ inputs.DOWNLOAD_URL || steps.releaseurlsetter.outputs.DOWNLOAD_URL }}
      run: |
        BINARY_PATH="/home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin"
        download_binary() {
          echo "Downloading binary from: $exe_path"
          curl -f -o "$BINARY_PATH" -JL "$exe_path" || {
            echo "ERROR: Failed to download binary."
            exit 1
          }
          chmod +x "$BINARY_PATH"
        }
        if [ -f "$BINARY_PATH" ]; then
          if file "$BINARY_PATH" | grep -q "ELF 64-bit"; then
            echo "Binary is valid ELF format"
            chmod +x "$BINARY_PATH"
          else
            echo "Binary corrupted, re-downloading..."
            rm -f "$BINARY_PATH"
            download_binary
          fi
        else
          echo "Binary not found, downloading..."
          download_binary
        fi
        if ! file "$BINARY_PATH" | grep -q "ELF 64-bit"; then
          echo "ERROR: Invalid binary"
          file "$BINARY_PATH"
          exit 1
        fi

    - name: Configure env.dev file
      shell: bash
      env:
        CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
        TOKEN_DEV : ${{secrets.TOKEN_DEV}}
        CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        TOKEN: ${{ secrets.TOKEN }}
        chat_idADMIN: ${{ secrets.chat_idADMIN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        TDU: ${{ secrets.TDU }}
        TAT: ${{ secrets.TAT }}
        MCU: ${{ secrets.MCU }}
        MCAP: ${{ secrets.MCAP }}
        MCL: ${{ secrets.MCL }}
        MS: ${{ secrets.MS }}
        PKG: ${{ secrets.PKG }}
        REPO_URL: ${{ secrets.REPO_URL }}
        KTOKEN: ${{ secrets.KTOKEN }}
        KUSER: ${{ secrets.KUSER }}
        KPWD: ${{ secrets.KPWD }}
        KTOTP: ${{ secrets.KTOTP }}
        DB_TYPE: "local"
        DB_TICKS: ${{ secrets.DB_TICKS }}
        TBTOKEN: ${{ secrets.TBTOKEN }}
        BBTOKEN: ${{ secrets.BBTOKEN }}
        Tel_API_ID: ${{ secrets.Tel_API_ID }}
        Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
        Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
        TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
        SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
      run: |
        # Quote all values to handle spaces properly
        cat > .env.dev << EOF
        CHAT_ID_DEV='$CHAT_ID_DEV'
        TOKEN_DEV='$TOKEN_DEV'
        CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
        CHAT_ID='$CHAT_ID'
        TOKEN='$TOKEN'
        chat_idADMIN='$chat_idADMIN'
        GITHUB_TOKEN='$GITHUB_TOKEN'
        CI_PAT='$CI_PAT'
        TURSO_TOKEN='$TURSO_TOKEN'
        TDU='$TDU'
        TAT='$TAT'
        MCU='$MCU'
        MCAP='$MCAP'
        MCL='$MCL'
        MS='$MS'
        PKG='$PKG'
        REPO_URL='$REPO_URL'
        KTOKEN='$KTOKEN'
        KUSER='$KUSER'
        KPWD='$KPWD'
        KTOTP='$KTOTP'
        DB_TYPE='$DB_TYPE'
        DB_TICKS='$DB_TICKS'
        TBTOKEN='$TBTOKEN'
        BBTOKEN='$BBTOKEN'
        Tel_API_ID='$Tel_API_ID'
        Tel_API_Hash='$Tel_API_Hash'
        Tel_Phone_Number='$Tel_Phone_Number'
        TEL_SESSION_DATA='$TEL_SESSION_DATA'
        SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
        EOF
        
        echo "Created .env.dev file with secrets (values quoted)"
        
        # Show the file (without revealing secrets)
        echo "File content (with values masked):"
        cat .env.dev | sed 's/=[^=]*$/=***/'
        
        echo `pwd`
        cp .env.dev /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
        ls -l

    - name: Run Telegram bot on Windows
      shell: cmd
      timeout-minutes: 290  # Slightly less than job timeout to allow cleanup
      continue-on-error: true
      if: startsWith(runner.os, 'Windows')
      env:
        RUNNER : "GitHub_Actions"
        MONITORING_BOT_RUNNER: "MONITORING_BOT_RUNNER"
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        pkscreenercli.exe --bot --botavailable ${{ inputs.cliOptions || '' }}

    - name: Telegram Bot on Ubuntu
      timeout-minutes: 290  # Slightly less than job timeout to allow cleanup
      continue-on-error: true
      shell: bash
      if: startsWith(runner.os, 'Linux')
      env:
        RUNNER : "GitHub_Actions"
        MONITORING_BOT_RUNNER: "MONITORING_BOT_RUNNER"
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # PKDevTools_Default_Log_Level: 10
        # PKDEVTOOLS_LOG_LEVEL: 10
        # PKDEVTOOLS_DEBUG_FILES: 'pkscreenercli.py,pkscreenerbot.py,PKAnalytics.py,subscriber.py'
      run: |
        pip3 install setuptools libsql
        pip3 install libsql-experimental || pip3 install libsql || echo "libsql not available (will use SQLite fallback)"
        # Also install other potential missing dependencies
        pip3 install chardet charset-normalizer
        echo "Starting bot at $(date)"
        echo "Bot will run in foreground with full output"
        cp /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev .env.dev
        # Source the environment file so the bot can access secrets
        source /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
        echo `pwd`
        ls -l
        # Run the bot in the foreground (not background) so the workflow waits
        # This will keep the workflow running until the bot exits
        /home/runner/work/PKScreener/PKScreener/pkscreenercli_x64.bin --bot --botavailable ${{ inputs.cliOptions || '' }} 2>&1 | tee bot_output.log
        
        # This line will only execute after the bot exits
        BOT_EXIT_CODE=${PIPESTATUS[0]}
        echo "Bot exited with code $BOT_EXIT_CODE at $(date)"
        
        # Save exit code for potential use
        echo "BOT_EXIT_CODE=$BOT_EXIT_CODE" >> $GITHUB_ENV

    - name: Self-trigger for 24x7 continuity
      if: always() && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔄 Self-triggering workflow for 24x7 continuity..."
        
        # Get current timestamp
        CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        echo "Current time: $CURRENT_TIME"
        
        # Check if bot exited with an error (optional - you can still trigger even on error)
        if [ -n "$BOT_EXIT_CODE" ] && [ "$BOT_EXIT_CODE" -ne 0 ]; then
          echo "⚠️ Bot exited with code $BOT_EXIT_CODE, but still triggering next run for continuity"
        fi
        
        # Trigger the workflow using repository dispatch
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/w3-workflow-bot.yml/dispatches \
          -d '{
            "ref": "main",
            "inputs": {
              "branch-name": "${{ github.event.inputs.branch-name || 'main' }}",
              "installtalib": "${{ github.event.inputs.installtalib || 'N' }}",
              "targetPythonVersion": "${{ github.event.inputs.targetPythonVersion || '3.12' }}",
              "runson": "${{ github.event.inputs.runson || 'ubuntu-latest' }}",
              "cliOptions": "${{ github.event.inputs.cliOptions || '-a Y -l' }}",
              "targetArch": "${{ github.event.inputs.targetArch || 'x64' }}",
              "triggered_by": "self_trigger_after_${{ github.run_id }}"
            }
          }'
        
        echo "✅ Self-trigger initiated successfully"
        echo "⏱️  Next run should start within 1-2 minutes"

    - name: Delete this repo workflow run
      shell: bash
      if: always()
      run: |
        gh run list --status success --limit 400 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
        gh run list --status cancelled --limit 400 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
        gh run list --status completed --limit 400 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
      env:
        GH_TOKEN : ${{secrets.GITHUB_TOKEN}}